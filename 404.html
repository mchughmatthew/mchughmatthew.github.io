<style>
  :root {
    --navy: #0c1b33;
    --navy-mid: #162645;
    --gold-light: #fff8db;
    --cream: #f8f4ef;
    --muted: #9aa3b2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(2.4rem, 6vw, 4rem);
    margin-bottom: 16px;
  }
  p { color: var(--muted); max-width: 46ch; margin: 0 auto 32px; line-height: 1.6; }
  a.home {
    display: inline-block;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    color: var(--navy);
    background: var(--gold-light);
    padding: 12px 28px;
    border-radius: 3px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  a.home:hover { opacity: 0.85; }
</style>

<body>
  <main>
    <div class="eyebrow">404 &middot; Not Found</div>
    <h1>This page doesn&rsquo;t exist</h1>
    <p>The page you&rsquo;re looking for may have moved or never existed. The homepage has links to everything on the site.</p>
